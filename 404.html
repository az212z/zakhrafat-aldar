<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الصفحة غير موجودة · زخرفة الدار</title>
<meta name="theme-color" content="#2A2421" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Tajawal", system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 0%, rgba(180,91,54,.32), transparent 55%),
      #2A2421;
    color: #F7F1E8; min-height: 100dvh;
    display: grid; place-items: center; text-align: center; padding: 24px;
  }
  .code { font-family: "El Messiri", sans-serif; font-size: clamp(4rem, 18vw, 8rem); font-weight: 700; color: #C97A55; line-height: 1; }
  h1 { font-family: "El Messiri", sans-serif; font-size: clamp(1.4rem, 5vw, 2rem); margin: 8px 0 12px; }
  p { color: rgba(247,241,232,.82); max-width: 44ch; margin: 0 auto 28px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px; background: #B45B36; color: #fff;
    font-weight: 700; padding: 14px 26px; border-radius: 999px; min-height: 48px;
    transition: transform .16s cubic-bezier(.23,1,.32,1), background-color .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn:hover { background: #934425; }
  :focus-visible { outline: 3px solid #C9A14A; outline-offset: 3px; }
  a { text-decoration: none; }
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط غير صحيح أو أن الصفحة نُقلت. لا مشكلة، نعيدك إلى البداية.</p>
    <a href="/zakhrafat-aldar/" class="btn">العودة للرئيسية</a>
  </main>
</body>
</html>
